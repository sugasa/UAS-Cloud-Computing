services:
  wordpress-db:
    image: mariadb:10.11
    container_name: wordpress-db
    restart: always

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: wordpressdb
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: wppassword

    volumes:
      - db_data:/var/lib/mysql

    networks:
      - backend-net

  wordpress:
    image: wordpress:6.5-apache
    container_name: wordpress-app
    restart: always

    depends_on:
      - wordpress-db

    ports:
      - "8080:80"

    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
      WORDPRESS_DB_NAME: wordpressdb

    volumes:
      - wordpress_data:/var/www/html

    networks:
      - frontend-net
      - backend-net

volumes:
  wordpress_data:
  db_data:

networks:
  frontend-net:
    driver: bridge

  backend-net:
    driver: bridge